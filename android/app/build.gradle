apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    // root = file("../")
    // reactNativeDir = file("../node_modules/react-native")
    // codegenDir = file("../node_modules/@react-native/codegen")
    // cliFile = file("../node_modules/react-native/cli.js")
    autolinkLibrariesWithApp()
}

def projectRoot = rootDir.getAbsoluteFile().getParentFile()

def enableProguardInReleaseBuilds = false
def enableSeparateBuildPerCPUArchitecture = false

android {
    compileSdkVersion rootProject.ext.compileSdkVersion

    namespace "com.cleanutilityapps.passeo"

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.cleanutilityapps.passeo"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 51
        versionName "1.0.51"
        missingDimensionStrategy "store", "play"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        /**
         * Passeo release signing variables (no collision with other apps):
         * PASSEO_UPLOAD_STORE_FILE (optional, default: passeo-release.keystore)
         * PASSEO_UPLOAD_KEY_ALIAS (optional, default: passeo)
         * PASSEO_UPLOAD_STORE_PASSWORD (required)
         * PASSEO_UPLOAD_KEY_PASSWORD (required)
         */
        release {
            def storeFileName = project.hasProperty('PASSEO_UPLOAD_STORE_FILE')
                    ? PASSEO_UPLOAD_STORE_FILE
                    : 'passeo-key.keystore'

            def aliasName = project.hasProperty('PASSEO_UPLOAD_KEY_ALIAS')
                    ? PASSEO_UPLOAD_KEY_ALIAS
                    : 'passeo-key'

            if (!project.hasProperty('PASSEO_UPLOAD_STORE_PASSWORD') ||
                    !project.hasProperty('PASSEO_UPLOAD_KEY_PASSWORD')) {
                throw new RuntimeException(
                        "Missing Passeo signing properties. " +
                        "Please set PASSEO_UPLOAD_STORE_PASSWORD and PASSEO_UPLOAD_KEY_PASSWORD " +
                        "in android/gradle.properties or ~/.gradle/gradle.properties."
                )
            }

            storeFile file(storeFileName)
            storePassword PASSEO_UPLOAD_STORE_PASSWORD
            keyAlias aliasName
            keyPassword PASSEO_UPLOAD_KEY_PASSWORD
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packaging {
        jniLibs {
            // Required for 16KB page size support:
            // Ensures native libraries are stored uncompressed and aligned.
            useLegacyPackaging = false
        }
    }

    // Ensure you are using the NDK version from the root project
    ndkVersion rootProject.ext.ndkVersion
}

project.ext.vectoricons = [
        iconFontNames: ['Ionicons.ttf', 'MaterialCommunityIcons.ttf', 'MaterialIcons.ttf']
]
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation("androidx.exifinterface:exifinterface:1.3.7")
}
